<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AluguelDeChácaras.com.br</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Captures the slug from the URL and redirects to index with it
    var seg = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
    if (seg) {
      sessionStorage.setItem('redirect_slug', seg);
    }
    window.location.replace(window.location.origin + '/');
  </script>
</head>
<body></body>
</html>
